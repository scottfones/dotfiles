vo=gpu-next
# hwdec=auto-safe
hwdec=vulkan
hwdec-codecs=all

gpu-api=vulkan
gpu-context=waylandvk

no-border

cache=yes
demuxer-max-bytes=1024M
demuxer-max-back-bytes=512M

# yt-dl
script-opts=ytdl_hook-try_ytdl_first=yes
ytdl-format=bestvideo[vcodec!^=av01]+bestaudio/best
ytdl-raw-options="compat-options=playlist-match-filter,yes-playlist="

# Subtitles
# sub-font='Roboto'
# sub-font='Trebuchet MS'
sub-font='LiterationSans Nerd Font'
sub-auto=fuzzy
# sub-border-size = 3
# sub-shadow-offset = 2
# sub-shadow-color = 0.0/0.0/0.0

display-tags=date,title,synopsis,description,summary,series_page,episode_page

[norm]
profile-desc="Normalize audio volume"
af=lavfi=[loudnorm=I=-18:TP=-1.5:LRA=8]

[youtube]
profile-desc=YouTube playback tweaks
profile-cond=string.match(p.path or "", "youtube%.com") or string.match(p.path or "", "youtu%.be")
deband=yes
deband-iterations=4
deband-threshold=48
deband-range=16
deband-grain=48
slang=en,eng
sub-visibility=no

[hdr]
profile-desc=HDR output
# vo=dmabuf-wayland
vo=gpu-next
hwdec=vulkan
gpu-api=vulkan
gpu-context=waylandvk
target-trc=pq
target-prim=bt.2020
target-peak=600
hdr-peak-percentile=99.995
hdr-compute-peak=yes
target-colorspace-hint=yes
tone-mapping=st2094-40

[hdr-sdr]
profile-desc=Tone map HDR
profile-cond=p["video-params/gamma"]=="pq" or p["video-params/gamma"]=="hlg"
tone-mapping=bt.2446a
gamut-mapping-mode=perceptual
hdr-compute-peak=yes
hdr-peak-percentile=99.995
hdr-contrast-recovery=0.5
target-contrast=inf

[ani]
profile-desc=Smooth animated content
video-sync=display-resample
interpolation=yes
interpolation-threshold=-1
tscale=mitchell
tscale-blur=0.65
