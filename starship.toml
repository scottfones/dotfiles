format = """
$cmd_duration\
[в–‘в–’в–“](#e7d7ad)\
$hostname\
[О¶ ](bg:#e7d7ad fg:#090c0c)\
[оӮҙ](bg:#eebd35 fg:#e7d7ad)\
$directory\
[оӮҙ](fg:#eebd35 bg:#98971a)\
$git_branch\
$git_status\
[оӮҙ](fg:#98971a bg:#d65d0e)\
$aws\
$azure\
$buf\
$c\
$conda\
$dart\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$php\
$python\
$rust\
[оӮҙ](fg:#d65d0e bg:#32302f)\
$time\
$sudo\
[оӮҙ ](fg:#32302f)\
\n$character"""

[cmd_duration]
format = "duration [$duration]($style)\n"

[hostname]
style = "bg:#e7d7ad " 
format = '[[$ssh_symbol](bg:#e7d7ad fg:#090c0c)]($style)'

[directory]
read_only = "п Ҫ"
style = "fg:#090c0c bg:#eebd35"
read_only_style = "fg:#cc241d bg:#eebd35"
format = "[ $path ]($style)[$read_only]($read_only_style)"
truncation_length = 5
truncation_symbol = "вҖҰ/"

[git_branch]
symbol = "пҗҳ"
style = "bg:#98971a"
format = '[[ $symbol $branch(:$remote_branch) ](fg:#090c0c bg:#98971a)]($style)'

[git_status]
style = "bg:#98971a"
format = '[[($all_status$ahead_behind )](fg:#090c0c bg:#98971a)]($style)'

[aws]
disabled = false
symbol = "вҳҒпёҸ "
style = "bg:#d65d0e"
format = '[[$symbol($profile )(\\($region\\) )(\\[$duration\\])](fg:#090c0c bg:#d65d0e)]($style)'

[azure]
disabled = false
symbol = "пҙғ"
style = "bg:#d65d0e"
format = "[[$symbol($subscription)](fg:#090c0c bg:#d65d0e)]($style)"

[buf]
symbol = "п’қ"
style = "bg:#d65d0e"
format = '[[ $symbol ($version) ](fg:#090c0c bg:#d65d0e)]($style)'

[c]
symbol = "оҳһ"
style = "bg:#d65d0e"
format = '[[ $symbol ($version(-$name)) ](fg:#090c0c bg:#d65d0e)]($style)'

[conda]
symbol = "п„Ң"
style = "bg:#d65d0e"
format = '[[ $symbol$environment ](fg:#090c0c bg:#d65d0e)]($style)'

[dart]
symbol = "оһҳ"
style = "bg:#d65d0e"
format = '[[ $symbol ($version) ](fg:#090c0c bg:#d65d0e)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:#d65d0e"
format = '[[ $symbol$context ](fg:#090c0c bg:#d65d0e)]($style)'

[elixir]
symbol = "оүө"
style = "bg:#d65d0e"
format = '[[ $symbol ($version \(OTP $otp_version\) ](fg:#090c0c bg:#d65d0e)]($style)'

[elm]
symbol = "оҳ¬"
style = "bg:#d65d0e"
format = '[[ $symbol ($version) ](fg:#090c0c bg:#d65d0e)]($style)'

[golang]
