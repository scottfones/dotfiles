style = "bg:#d65d0e"
format = '[[ $symbol ($version) ](fg:#090c0c bg:#d65d0e)]($style)'

[haskell]
symbol = "оқ·"
style = "bg:#d65d0e"
format = '[[ $symbol ($version) ](fg:#090c0c bg:#d65d0e)]($style)'

[hg_branch]
symbol = "пҗҳ"
style = "bg:#d65d0e"
format = '[[ $symbol ($version) ](fg:#090c0c bg:#d65d0e)]($style)'

[java]
symbol = "оү–"
style = "bg:#d65d0e"
format = '[[ $symbol ($version) ](fg:#090c0c bg:#d65d0e)]($style)'

[julia]
symbol = "оҳӨ"
style = "bg:#d65d0e"
format = '[[ $symbol ($version) ](fg:#090c0c bg:#d65d0e)]($style)'

[memory_usage]
symbol = "пЎҡ"
style = "bg:#d65d0e"
format = '[[ $symbol ($version) ](fg:#090c0c bg:#d65d0e)]($style)'

[nodejs]
